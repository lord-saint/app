<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sumit.local</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='3' y='23' font-size='19' font-family='monospace' fill='%2300eeff'%3E%3E_%3C/text%3E%3C/svg%3E">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:   #000000;
      --bg2:  #060606;
      --bg3:  #0c0c0c;
      --s1:   rgba(255,255,255,0.03);
      --s2:   rgba(255,255,255,0.06);
      --b1:   rgba(255,255,255,0.07);
      --b2:   rgba(255,255,255,0.12);
      --bh:   rgba(0,234,255,0.45);
      --cy:   #00eaff;
      --cy2:  rgba(0,234,255,0.08);
      --cy3:  rgba(0,234,255,0.04);
      --cy4:  rgba(0,234,255,0.15);
      --gr:   #69ff94;
      --gr2:  rgba(105,255,148,0.08);
      --am:   #fbbf24;
      --re:   #ff6b6b;
      --re2:  rgba(255,107,107,0.08);
      --pu:   #c084fc;
      --tx:   #d8dce8;
      --tx2:  rgba(255,255,255,0.35);
      --tx3:  rgba(255,255,255,0.14);
      --tx4:  rgba(255,255,255,0.06);
      --fn:   'JetBrains Mono', monospace;
      --bar-h: 28px;
      --radius: 0px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body {
      font-family: var(--fn);
      color: var(--tx);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.04) 2px,
        rgba(0,0,0,0.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* subtle vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
      z-index: 9998;
    }

    /* ── TOPBAR ── */
    .bar {
      height: var(--bar-h);
      display: flex;
      align-items: stretch;
      background: rgba(0,0,0,0.75);
      border-bottom: 1px solid var(--b1);
      backdrop-filter: blur(24px) saturate(140%);
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }

    .bar-logo {
      display: flex;
      align-items: center;
      padding: 0 1rem;
      font-size: .65rem;
      font-weight: 700;
      color: var(--cy);
      letter-spacing: .12em;
      border-right: 1px solid var(--b1);
      flex-shrink: 0;
      gap: .4rem;
    }
    .bar-logo-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--cy);
      box-shadow: 0 0 6px var(--cy);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .bar-nav { display: flex; align-items: stretch; flex: 1; }

    .nb {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: 0 .9rem;
      font-size: .62rem;
      font-weight: 500;
      color: var(--tx2);
      background: none;
      border: none;
      border-right: 1px solid var(--b1);
      cursor: pointer;
      letter-spacing: .09em;
      transition: color .15s, background .15s;
      white-space: nowrap;
      font-family: var(--fn);
      position: relative;
    }
    .nb:hover { color: var(--tx); background: var(--tx4); }
    .nb.on { color: var(--cy); background: var(--cy3); }
    .nb.on::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--cy);
      box-shadow: 0 0 8px var(--cy);
    }
    .nb .ndot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: currentColor;
      opacity: .5;
      flex-shrink: 0;
    }

    .bar-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: .85rem;
      padding: 0 1rem;
      border-left: 1px solid var(--b1);
      font-size: .6rem;
      color: var(--tx2);
      flex-shrink: 0;
    }
    #bc { color: var(--cy); font-weight: 700; letter-spacing: .1em; font-size: .65rem; }
    #bd { color: var(--tx3); letter-spacing: .04em; }

    .srv-wrap { display: flex; align-items: center; gap: .35rem; }
    #srv-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--re);
      flex-shrink: 0;
      transition: background .4s, box-shadow .4s;
    }
    #srv-dot.ok { background: var(--gr); box-shadow: 0 0 5px var(--gr); }
    #srv-label { font-size: .55rem; color: var(--tx3); letter-spacing: .06em; }

    /* ── PAGES ── */
    .pg { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .pg.on { display: flex; }

    .scr {
      flex: 1;
      overflow-y: auto;
      padding: 1.4rem 1.6rem 5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--b2) transparent;
    }
    .scr::-webkit-scrollbar { width: 2px; }
    .scr::-webkit-scrollbar-thumb { background: var(--b2); }

    /* ── SECTION LABELS ── */
    .lbl {
      font-size: .55rem;
      font-weight: 700;
      letter-spacing: .18em;
      color: var(--tx3);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: .6rem;
      margin-bottom: .7rem;
    }
    .lbl::before { content: '//'; color: var(--cy); opacity: .4; font-size: .52rem; }
    .lbl::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, var(--b2), transparent); }

    .gap { margin-bottom: 1.4rem; }
    .gap2 { margin-bottom: .7rem; }

    /* ── INPUTS ── */
    .inp {
      background: var(--s1);
      border: 1px solid var(--b1);
      padding: .5rem .75rem;
      color: var(--tx);
      font-family: var(--fn);
      font-size: .77rem;
      outline: none;
      transition: border-color .15s, background .15s;
      width: 100%;
    }
    .inp:focus { border-color: var(--bh); background: rgba(0,234,255,0.02); }
    .inp::placeholder { color: var(--tx3); font-style: italic; font-weight: 300; }

    .btn {
      background: var(--cy2);
      border: 1px solid rgba(0,234,255,.18);
      padding: .5rem 1rem;
      color: var(--cy);
      font-family: var(--fn);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      cursor: pointer;
      transition: background .12s, border-color .12s, box-shadow .12s;
      white-space: nowrap;
    }
    .btn:hover {
      background: var(--cy4);
      border-color: rgba(0,234,255,.35);
      box-shadow: 0 0 12px rgba(0,234,255,.06);
    }
    .btn:active { transform: scale(0.98); }

    /* ── ENTRY ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .pg.on > .scr > * { animation: fadeUp .3s ease both; }
    .pg.on > .scr > *:nth-child(2) { animation-delay: .05s; }
    .pg.on > .scr > *:nth-child(3) { animation-delay: .10s; }
    .pg.on > .scr > *:nth-child(4) { animation-delay: .15s; }
    .pg.on > .scr > *:nth-child(5) { animation-delay: .20s; }

    /* ── LAUNCHER ── */
    #pg-l { align-items: center; justify-content: center; background: var(--bg); }
    .lw { width: 100%; max-width: 580px; padding: 1rem; display: flex; flex-direction: column; gap: 3px; }

    .lbar {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: 0 1rem;
      background: var(--s1);
      border: 1px solid var(--b1);
      transition: border-color .15s, box-shadow .15s;
    }
    .lbar:focus-within {
      border-color: var(--bh);
      box-shadow: 0 0 0 1px rgba(0,234,255,.06), 0 0 24px rgba(0,234,255,.05);
    }
    .lpre { color: var(--cy); font-size: .85rem; font-weight: 700; flex-shrink: 0; user-select: none; opacity: .7; }
    #li {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--fn);
      font-size: .82rem;
      color: var(--tx);
      padding: .85rem 0;
      caret-color: var(--cy);
    }
    #li::placeholder { color: var(--tx3); font-size: .72rem; }
    .lhint { font-size: .55rem; color: var(--tx3); letter-spacing: .06em; flex-shrink: 0; }

    .lres {
      background: rgba(4,4,4,.97);
      border: 1px solid var(--b1);
      border-top: none;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }
    .litem {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .48rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.02);
      cursor: pointer;
      transition: background .08s;
      text-decoration: none;
      color: var(--tx);
    }
    .litem:first-child { border-top: none; }
    .litem:hover, .litem.on { background: var(--cy2); }
    .litem:hover .la, .litem.on .la { color: var(--cy); }
    .la { font-size: .62rem; font-weight: 700; color: var(--tx3); min-width: 34px; letter-spacing: .07em; transition: color .08s; }
    .lic { font-size: .88rem; width: 18px; text-align: center; }
    .ln { font-size: .78rem; font-weight: 500; flex: 1; }
    .lcat { font-size: .54rem; letter-spacing: .1em; text-transform: uppercase; }
    .lcat.ai     { color: rgba(0,234,255,.5); }
    .lcat.dev    { color: rgba(105,255,148,.5); }
    .lcat.media  { color: rgba(251,191,36,.5); }
    .lcat.social { color: rgba(255,107,107,.5); }
    .lcat.school { color: rgba(192,132,252,.5); }
    .lno { padding: .7rem 1rem; font-size: .7rem; color: var(--tx3); font-style: italic; }

    /* launcher grid */
    .lgrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1px;
      margin-top: 3px;
      background: var(--b1);
      border: 1px solid var(--b1);
    }
    .lgi {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .28rem;
      padding: .65rem .3rem;
      background: var(--bg);
      cursor: pointer;
      color: var(--tx2);
      font-size: .58rem;
      letter-spacing: .04em;
      transition: background .1s, color .1s;
      text-align: center;
      border: none;
    }
    .lgi:hover { background: var(--cy3); color: var(--tx); }
    .lgi:hover .lgal { color: var(--cy); }
    .lgi .lgem { font-size: .95rem; }
    .lgi .lgal { color: var(--tx3); font-size: .52rem; font-weight: 700; letter-spacing: .08em; transition: color .1s; }

    /* ── HOME ── */
    /* Focus bar */
    .fbar {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .8rem 1rem;
      background: var(--s1);
      border: 1px solid var(--b1);
      transition: border-color .18s, background .18s;
      position: relative;
    }
    .fbar:focus-within { border-color: rgba(0,234,255,.25); background: rgba(0,234,255,.015); }
    .fbar.fdone {
      border-color: rgba(105,255,148,.25);
      background: rgba(105,255,148,.02);
    }
    .fbar.fdone #fin { color: var(--gr); text-decoration: line-through; text-decoration-color: rgba(105,255,148,.3); }

    .fpre { color: var(--cy); font-size: .72rem; flex-shrink: 0; user-select: none; opacity: .6; }
    #fin {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--fn);
      font-size: .82rem;
      color: var(--tx);
      caret-color: var(--cy);
    }
    #fin::placeholder { color: var(--tx3); font-style: italic; font-weight: 300; font-size: .75rem; }

    .fdb, .fcb {
      background: none;
      border: none;
      font-family: var(--fn);
      cursor: pointer;
      flex-shrink: 0;
      color: var(--tx3);
      font-size: .8rem;
      transition: color .12s, transform .15s;
      line-height: 1;
    }
    .fdb:hover { color: var(--gr); transform: scale(1.25); }
    .fcb { opacity: 0; pointer-events: none; transition: opacity .14s, color .12s; }
    .fcb.vis { opacity: 1; pointer-events: all; }
    .fcb:hover { color: var(--re); }

    /* quote */
    .qline {
      font-size: .7rem;
      font-style: italic;
      font-weight: 300;
      color: var(--tx3);
      text-align: center;
      padding: .2rem 0;
      cursor: pointer;
      transition: opacity .3s, color .15s;
      letter-spacing: .02em;
      line-height: 1.6;
    }
    .qline:hover { color: var(--tx2); }
    .qline.fade { opacity: 0; }

    /* tasks */
    .task-add { display: flex; gap: .4rem; margin-bottom: .6rem; }

    .task-list { display: flex; flex-direction: column; gap: 2px; }

    .titem {
      display: flex;
      align-items: center;
      gap: .7rem;
      padding: .52rem .8rem;
      background: var(--s1);
      border: 1px solid var(--b1);
      transition: background .1s, border-color .1s;
    }
    .titem:hover { background: var(--s2); border-color: var(--b2); }
    .titem.tdone { opacity: .38; }
    .titem.tdone .ttext { text-decoration: line-through; color: var(--tx3); }

    .tchk {
      width: 13px; height: 13px;
      border: 1px solid var(--b2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: .56rem;
      transition: background .12s, border-color .12s, color .12s;
      color: transparent;
    }
    .tchk:hover { border-color: var(--cy); }
    .tchk.chked { background: var(--cy2); border-color: rgba(0,234,255,.4); color: var(--cy); }

    .ttext { font-size: .77rem; flex: 1; color: var(--tx); }
    .tdate { font-size: .56rem; color: var(--tx3); flex-shrink: 0; }
    .tdel {
      background: none; border: none;
      color: var(--tx3); cursor: pointer;
      font-size: .78rem; font-family: var(--fn);
      opacity: 0; transition: opacity .1s, color .1s;
      line-height: 1;
    }
    .titem:hover .tdel { opacity: 1; }
    .tdel:hover { color: var(--re); }
    .tempty { font-size: .7rem; color: var(--tx3); font-style: italic; padding: .7rem .2rem; }

    /* task stats strip */
    .tstats {
      display: flex;
      gap: 1.4rem;
      margin-bottom: .9rem;
      font-size: .6rem;
      color: var(--tx3);
    }
    .tstats span { display: flex; align-items: center; gap: .35rem; }
    .tstats .val { color: var(--cy); font-weight: 700; font-size: .65rem; }
    .tstats .val.done-val { color: var(--gr); }

    /* ── NOTES ── */
    #pg-n { overflow: hidden; }

    .ntabs {
      display: flex;
      border-bottom: 1px solid var(--b1);
      background: var(--bg2);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .ntabs::-webkit-scrollbar { height: 0; }

    .ntab {
      display: flex;
      align-items: center;
      gap: .45rem;
      padding: 0 .9rem;
      height: 30px;
      font-family: var(--fn);
      font-size: .62rem;
      font-weight: 500;
      color: var(--tx3);
      background: none;
      border: none;
      border-right: 1px solid var(--b1);
      cursor: pointer;
      letter-spacing: .05em;
      transition: color .12s, background .12s;
      white-space: nowrap;
      position: relative;
    }
    .ntab:hover { color: var(--tx); background: var(--tx4); }
    .ntab.non { color: var(--cy); background: var(--cy3); }
    .ntab.non::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: var(--cy);
    }
    .ntab-del {
      color: var(--tx3); font-size: .68rem;
      opacity: 0; transition: opacity .1s, color .1s;
      line-height: 1;
    }
    .ntab:hover .ntab-del { opacity: 1; }
    .ntab-del:hover { color: var(--re) !important; }
    .ntab-add {
      display: flex; align-items: center;
      padding: 0 .8rem; height: 30px;
      font-family: var(--fn); font-size: .75rem;
      color: var(--tx3); background: none; border: none;
      cursor: pointer; transition: color .1s;
    }
    .ntab-add:hover { color: var(--cy); }

    .npanel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .npanel.non { display: flex; }

    .ntitle-bar {
      display: flex; align-items: center; gap: .6rem;
      padding: .45rem 1rem;
      border-bottom: 1px solid var(--b1);
      background: var(--bg2);
      flex-shrink: 0;
    }
    .ntitle-in {
      flex: 1; background: none; border: none; outline: none;
      font-family: var(--fn); font-size: .7rem; font-weight: 700;
      color: var(--tx); letter-spacing: .05em; caret-color: var(--cy);
    }
    .ncount { font-size: .58rem; color: var(--tx3); }

    .nta {
      flex: 1;
      background: var(--bg);
      border: none; outline: none;
      padding: 1.1rem 1.3rem;
      color: var(--tx);
      font-family: var(--fn);
      font-size: .79rem;
      line-height: 1.9;
      resize: none;
      caret-color: var(--cy);
    }
    .nta::placeholder { color: var(--tx3); font-style: italic; }
    .nta::-webkit-scrollbar { width: 2px; }
    .nta::-webkit-scrollbar-thumb { background: var(--b2); }

    .nfooter {
      display: flex; justify-content: space-between; align-items: center;
      padding: .32rem 1rem;
      border-top: 1px solid var(--b1);
      background: var(--bg2);
      font-size: .58rem; color: var(--tx3);
      flex-shrink: 0;
    }
    .nfooter-left { display: flex; align-items: center; gap: .5rem; }
    .nsync { display: flex; align-items: center; gap: .3rem; }
    .nsync-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gr); transition: background .3s; }
    .nsync-dot.syncing { background: var(--am); animation: pulse 1s infinite; }
    .nfooter button {
      background: none; border: none; font-family: var(--fn);
      font-size: .58rem; color: var(--tx3); cursor: pointer; transition: color .1s;
    }
    .nfooter button:hover { color: var(--re); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 1.2rem; left: 50%; transform: translateX(-50%) translateY(12px);
      background: rgba(10,10,10,.95);
      border: 1px solid var(--b2);
      padding: .45rem 1rem;
      font-size: .68rem; color: var(--tx2);
      letter-spacing: .05em;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; z-index: 1000;
      backdrop-filter: blur(16px);
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.t-ok  { color: var(--gr); border-color: rgba(105,255,148,.2); }
    #toast.t-err { color: var(--re); border-color: rgba(255,107,107,.2); }

    /* ── KEYBOARD SHORTCUT HINT ── */
    .kb-hint {
      position: fixed;
      bottom: .7rem; right: 1rem;
      font-size: .54rem; color: var(--tx3);
      letter-spacing: .06em;
      display: flex; gap: 1rem;
      z-index: 100;
    }
    .kb-hint span { display: flex; align-items: center; gap: .3rem; }
    .kb { border: 1px solid var(--b2); padding: .1rem .35rem; font-size: .5rem; color: var(--tx3); }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="bar">
  <div class="bar-logo">
    <div class="bar-logo-dot"></div>
    &gt;_ sumit.local
  </div>
  <nav class="bar-nav">
    <button class="nb on" data-p="pg-l"><span class="ndot"></span>LAUNCH</button>
    <button class="nb" data-p="pg-h"><span class="ndot"></span>HOME</button>
    <button class="nb" data-p="pg-n"><span class="ndot"></span>NOTES</button>
  </nav>
  <div class="bar-right">
    <div class="srv-wrap" title="server status">
      <div id="srv-dot"></div>
      <span id="srv-label">offline</span>
    </div>
    <span id="bc">00:00</span>
    <span id="bd"></span>
  </div>
</div>

<!-- LAUNCHER -->
<div class="pg on" id="pg-l" style="align-items:center;justify-content:center;">
  <div class="lw">
    <div class="lbar">
      <span class="lpre">&gt;_</span>
      <input type="text" id="li" placeholder="type alias or name — cl · ds · yt · gh · dc · mt…" autocomplete="off" spellcheck="false">
      <span class="lhint">↑↓ enter esc</span>
    </div>
    <div class="lres" id="lr" style="display:none"></div>
    <div class="lgrid" id="lg"></div>
  </div>
</div>

<!-- HOME -->
<div class="pg" id="pg-h">
  <div class="scr">
    <div class="lbl gap2">today's focus</div>
    <div class="fbar gap" id="fwrap">
      <span class="fpre">✦</span>
      <input type="text" id="fin" placeholder="what's the one thing you want to do today?" maxlength="90" autocomplete="off">
      <button class="fdb" id="fdb" title="mark done">○</button>
      <button class="fcb" id="fcb" title="clear">×</button>
    </div>
    <div class="gap"><div class="qline" id="qel" title="click for new quote"></div></div>

    <div class="lbl gap2">quick tasks</div>
    <div class="tstats" id="tstats"></div>
    <div class="task-add gap2">
      <input class="inp" id="t-in" type="text" placeholder="add a quick task…" style="flex:1">
      <button class="btn" onclick="addTask()">+ ADD</button>
    </div>
    <div class="task-list gap" id="tlist"></div>
  </div>
</div>

<!-- NOTES -->
<div class="pg" id="pg-n">
  <div class="ntabs" id="ntabs">
    <button class="ntab-add" id="nadd-btn" onclick="addNote()" title="new note (Ctrl+/)">＋</button>
  </div>
  <div id="npanels" style="display:flex;flex:1;overflow:hidden;flex-direction:column;"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- KEYBOARD HINTS -->
<div class="kb-hint">
  <span><kbd class="kb">Ctrl+/</kbd> new note</span>
  <span><kbd class="kb">Enter</kbd> launch</span>
  <span><kbd class="kb">Esc</kbd> clear</span>
</div>

<script>
// ── CONFIG ──
const API = 'https://server-production-ac4d2.up.railway.app';

// ── HELPERS ──
async function api(method, path, body) {
  try {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' t-' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2200);
}

// ── SERVER STATUS ──
async function checkServer() {
  const dot   = document.getElementById('srv-dot');
  const label = document.getElementById('srv-label');
  try {
    await fetch(API + '/tasks');
    dot.classList.add('ok');
    label.textContent = 'online';
  } catch(e) {
    dot.classList.remove('ok');
    label.textContent = 'offline';
  }
}
checkServer();
setInterval(checkServer, 8000);

// ── CLOCK ──
function tick() {
  const n = new Date();
  document.getElementById('bc').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  document.getElementById('bd').textContent =
    n.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });
}
tick(); setInterval(tick, 10000);

// ── NAV ──
const pgs = document.querySelectorAll('.pg');
const nbs = document.querySelectorAll('.nb');

function goPage(id) {
  pgs.forEach(p => p.classList.remove('on'));
  nbs.forEach(b => b.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelector(`[data-p="${id}"]`).classList.add('on');

  if (id === 'pg-l') setTimeout(() => document.getElementById('li').focus(), 40);
  if (id === 'pg-h') setTimeout(() => document.getElementById('fin').focus(), 40);
  if (id === 'pg-n') setTimeout(() => {
    const ta = document.querySelector('.npanel.non .nta');
    if (ta) ta.focus();
  }, 40);
}

nbs.forEach(b => b.addEventListener('click', () => goPage(b.dataset.p)));

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === '/') {
    e.preventDefault();
    goPage('pg-n');
    setTimeout(() => addNote(), 60);
  }
});

// ── LAUNCHER ──
const ITEMS = [
  {a:'cl',  n:'Claude',      i:'🤖', u:'https://claude.ai',                      c:'ai'},
  {a:'ds',  n:'DeepSeek',    i:'🧠', u:'https://chat.deepseek.com',              c:'ai'},
  {a:'gpt', n:'ChatGPT',     i:'💬', u:'https://chat.openai.com',                c:'ai'},
  {a:'px',  n:'Perplexity',  i:'🔍', u:'https://www.perplexity.ai',              c:'ai'},
  {a:'gh',  n:'GitHub',      i:'🐙', u:'https://github.com/lord-saint',          c:'dev'},
  {a:'mdn', n:'MDN',         i:'📖', u:'https://developer.mozilla.org',          c:'dev'},
  {a:'npm', n:'npm',         i:'📦', u:'https://www.npmjs.com',                  c:'dev'},
  {a:'lh',  n:'localhost',   i:'🖥️', u:'http://localhost:3000',                  c:'dev'},
  {a:'yt',  n:'YouTube',     i:'▶️', u:'https://youtube.com/feed/subscriptions', c:'media'},
  {a:'mt',  n:'Monkeytype',  i:'⌨️', u:'https://monkeytype.com',                 c:'media'},
  {a:'nt',  n:'Novel',       i:'📝', u:'https://entertrained.app',               c:'media'},
  {a:'mal', n:'MyAnimeList', i:'🎌', u:'https://myanimelist.net',                c:'media'},
  {a:'dc',  n:'Discord',     i:'💬', u:'https://discord.com/app',                c:'social'},
  {a:'rd',  n:'Reddit',      i:'👾', u:'https://reddit.com',                     c:'social'},
  {a:'ig',  n:'Instagram',   i:'📷', u:'https://instagram.com',                  c:'social'},
  {a:'gc',  n:'Classroom',   i:'🏫', u:'https://classroom.google.com',           c:'school'},
  {a:'gd',  n:'Drive',       i:'📁', u:'https://drive.google.com',               c:'school'},
  {a:'cal', n:'Calendar',    i:'📅', u:'https://calendar.google.com',            c:'school'},
];

const liEl = document.getElementById('li');
const lrEl = document.getElementById('lr');
const lgEl = document.getElementById('lg');
let lf = [], la = 0;

// build grid
ITEMS.forEach(item => {
  const el = document.createElement('button');
  el.className = 'lgi';
  el.innerHTML = `<span class="lgem">${item.i}</span><span>${item.n}</span><span class="lgal">${item.a}</span>`;
  el.onclick = () => lopen(item.u);
  lgEl.appendChild(el);
});

liEl.addEventListener('input', () => {
  const q = liEl.value.trim().toLowerCase();
  if (!q) { lgEl.style.display = ''; lrEl.style.display = 'none'; lf = []; return; }
  lgEl.style.display = 'none'; lrEl.style.display = '';
  lf = ITEMS
    .filter(x => x.a.startsWith(q) || x.n.toLowerCase().includes(q) || x.c.includes(q))
    .sort((a, b) => (a.a === q ? -2 : a.a.startsWith(q) ? -1 : 0) - (b.a === q ? -2 : b.a.startsWith(q) ? -1 : 0));
  la = 0; lrender();
});

function lrender() {
  if (!lf.length) { lrEl.innerHTML = '<div class="lno">no match — try: cl ds gpt yt gh dc mt</div>'; return; }
  lrEl.innerHTML = lf.map((x, i) =>
    `<div class="litem ${i === la ? 'on' : ''}" data-i="${i}">
      <span class="la">${x.a}</span>
      <span class="lic">${x.i}</span>
      <span class="ln">${x.n}</span>
      <span class="lcat ${x.c}">${x.c}</span>
    </div>`
  ).join('');
  lrEl.querySelectorAll('.litem').forEach(el => {
    el.onclick = () => lopen(lf[+el.dataset.i].u);
    el.onmouseenter = () => { la = +el.dataset.i; lhl(); };
  });
}

function lhl() {
  lrEl.querySelectorAll('.litem').forEach((el, i) => el.classList.toggle('on', i === la));
}

liEl.addEventListener('keydown', e => {
  if      (e.key === 'ArrowDown')  { e.preventDefault(); if (lf.length) { la = (la+1) % lf.length; lhl(); } }
  else if (e.key === 'ArrowUp')    { e.preventDefault(); if (lf.length) { la = (la-1+lf.length) % lf.length; lhl(); } }
  else if (e.key === 'Enter')      { e.preventDefault(); if (lf.length) lopen(lf[la].u); }
  else if (e.key === 'Escape')     { liEl.value = ''; lgEl.style.display = ''; lrEl.style.display = 'none'; lf = []; }
});

function lopen(url) {
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  liEl.value = ''; lgEl.style.display = ''; lrEl.style.display = 'none'; lf = [];
  liEl.focus();
}

window.addEventListener('load', () => liEl.focus());

// ── QUOTES ──
const QS = [
  'the secret of getting ahead is getting started.',
  'stop organizing. start doing.',
  'one page a day is a book in a year.',
  'distraction is the enemy of depth.',
  'close the tab. write the thing.',
  'the work you avoid is usually the work that matters.',
  'details are not details. they make the design.',
  'progress, not perfection.',
  'do the hard part first. everything else is easy.',
  'your future self is watching you right now.',
  'boredom is the beginning of every great project.',
  'the person who chases two rabbits catches neither.',
  'clarity is the new productivity.',
  'ship it, then improve it.',
  'less, but better.',
];
let lq = -1;
const qel = document.getElementById('qel');
function nq() {
  qel.classList.add('fade');
  setTimeout(() => {
    let i; do { i = Math.floor(Math.random() * QS.length); } while (i === lq && QS.length > 1);
    lq = i; qel.textContent = '"' + QS[i] + '"'; qel.classList.remove('fade');
  }, 280);
}
qel.addEventListener('click', nq); nq();

// ══════════════════════
//  FOCUS
// ══════════════════════
const fin   = document.getElementById('fin');
const fwrap = document.getElementById('fwrap');
const fdb   = document.getElementById('fdb');
const fcb   = document.getElementById('fcb');

api('GET', '/focus').then(data => {
  if (!data) return;
  fin.value = data.text || '';
  if (fin.value) fcb.classList.add('vis');
  if (data.done) setDone(true);
});

let focusTimer;
fin.addEventListener('input', () => {
  fcb.classList.toggle('vis', fin.value.length > 0);
  if (fwrap.classList.contains('fdone')) unDone();
  clearTimeout(focusTimer);
  focusTimer = setTimeout(saveFocus, 800);
});

fin.addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); toggleDone(); }
});

fcb.addEventListener('click', () => {
  fin.value = ''; fcb.classList.remove('vis'); unDone();
  api('POST', '/focus', { text: '', done: false });
});

fdb.addEventListener('click', toggleDone);

function toggleDone() {
  if (fwrap.classList.contains('fdone')) {
    unDone(); api('POST', '/focus', { text: fin.value, done: false });
  } else {
    setDone(); api('POST', '/focus', { text: fin.value, done: true });
    toast('focus marked done ✓', 'ok');
  }
}
function saveFocus() { api('POST', '/focus', { text: fin.value, done: fwrap.classList.contains('fdone') }); }
function setDone(silent) {
  fwrap.classList.add('fdone'); fdb.textContent = '✓';
  if (!silent) { fdb.style.transform = 'scale(1.35)'; setTimeout(() => fdb.style.transform = '', 230); }
}
function unDone() { fwrap.classList.remove('fdone'); fdb.textContent = '○'; }

// ══════════════════════
//  TASKS
// ══════════════════════
let tasks = [];

api('GET', '/tasks').then(data => {
  if (data) { tasks = data; renderTasks(); }
});

document.getElementById('t-in').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

async function addTask() {
  const v = document.getElementById('t-in').value.trim();
  if (!v) return;
  const date = new Date().toLocaleDateString('en-IN', { day:'numeric', month:'short' });
  const result = await api('POST', '/tasks', { text: v, date });
  if (result) { tasks.unshift(result); renderTasks(); toast('task added', 'ok'); }
  else toast('failed to add task', 'err');
  document.getElementById('t-in').value = '';
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = t.done ? 0 : 1;
  await api('PATCH', '/tasks/' + id, { done: t.done });
  renderTasks();
}

async function delTask(id) {
  await api('DELETE', '/tasks/' + id);
  tasks = tasks.filter(x => x.id !== id);
  renderTasks();
  toast('task removed');
}

function renderTasks() {
  const el = document.getElementById('tlist');
  const statsEl = document.getElementById('tstats');

  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round((done/total)*100) : 0;

  if (total) {
    statsEl.innerHTML = `
      <span><span class="val">${total}</span> total</span>
      <span><span class="val done-val">${done}</span> done</span>
      <span><span class="val">${pct}%</span> complete</span>
    `;
  } else {
    statsEl.innerHTML = '';
  }

  if (!tasks.length) { el.innerHTML = '<div class="tempty">no tasks — add one above</div>'; return; }
  el.innerHTML = tasks.map(t => `
    <div class="titem ${t.done ? 'tdone' : ''}">
      <div class="tchk ${t.done ? 'chked' : ''}" onclick="toggleTask(${t.id})">${t.done ? '✓' : ''}</div>
      <span class="ttext">${escHtml(t.text)}</span>
      <span class="tdate">${t.date}</span>
      <button class="tdel" onclick="delTask(${t.id})" title="remove">×</button>
    </div>
  `).join('');
}

// ══════════════════════
//  NOTES
// ══════════════════════
let notes = [];
let activeNote = null;

api('GET', '/notes').then(data => {
  if (data && data.length) {
    notes = data;
    activeNote = notes[0].id;
    renderNotes();
  }
});

async function addNote() {
  if (document.getElementById('pg-n').classList.contains('on') === false) goPage('pg-n');
  const title = 'note ' + (notes.length + 1);
  const result = await api('POST', '/notes', { title, body: '' });
  if (result) {
    notes.push(result);
    activeNote = result.id;
    renderNotes();
    setTimeout(() => { const ti = document.querySelector('.npanel.non .ntitle-in'); if (ti) ti.focus(); }, 40);
  }
}

async function delNote(e, id) {
  e.stopPropagation();
  if (notes.length === 1) {
    notes[0].title = 'scratch'; notes[0].body = '';
    await api('PATCH', '/notes/' + id, { title: 'scratch', body: '' });
    renderNotes(); return;
  }
  await api('DELETE', '/notes/' + id);
  notes = notes.filter(x => x.id !== id);
  if (activeNote === id) activeNote = notes[notes.length - 1].id;
  renderNotes();
  toast('note deleted');
}

async function clearNote(id) {
  const n = notes.find(x => x.id === id);
  if (n && (n.body === '' || confirm('Clear this note?'))) {
    n.body = '';
    await api('PATCH', '/notes/' + id, { title: n.title, body: '' });
    renderNotes();
    toast('note cleared');
  }
}

function renderNotes() {
  const tabsEl   = document.getElementById('ntabs');
  const panelsEl = document.getElementById('npanels');
  const addBtn   = document.getElementById('nadd-btn');

  tabsEl.querySelectorAll('.ntab').forEach(x => x.remove());
  panelsEl.innerHTML = '';

  notes.forEach(note => {
    // Tab
    const tab = document.createElement('button');
    tab.className = 'ntab' + (note.id === activeNote ? ' non' : '');
    tab.dataset.nid = note.id;
    tab.innerHTML = `<span class="ntab-name">${escHtml(note.title || 'untitled')}</span><span class="ntab-del" onclick="delNote(event,${note.id})">×</span>`;
    tab.addEventListener('click', () => {
      activeNote = note.id; renderNotes();
      setTimeout(() => { const ta = document.querySelector('.npanel.non .nta'); if (ta) ta.focus(); }, 30);
    });
    tabsEl.insertBefore(tab, addBtn);

    // Panel
    const panel = document.createElement('div');
    panel.className = 'npanel' + (note.id === activeNote ? ' non' : '');
    panel.dataset.nid = note.id;
    panel.innerHTML = `
      <div class="ntitle-bar">
        <input class="ntitle-in" value="${escAttr(note.title || '')}" placeholder="note title" data-nid="${note.id}">
        <span class="ncount" id="nc-${note.id}">${(note.body || '').length} chars</span>
      </div>
      <textarea class="nta" placeholder="// write anything…" data-nid="${note.id}">${escHtml(note.body || '')}</textarea>
      <div class="nfooter">
        <div class="nfooter-left">
          <div class="nsync"><div class="nsync-dot" id="nd-${note.id}"></div><span>synced</span></div>
        </div>
        <button onclick="clearNote(${note.id})">clear</button>
      </div>
    `;
    panelsEl.appendChild(panel);

    // Title handler
    const titleIn = panel.querySelector('.ntitle-in');
    let titleTimer;
    titleIn.addEventListener('input', () => {
      const n2 = notes.find(x => x.id === +titleIn.dataset.nid);
      if (n2) {
        n2.title = titleIn.value;
        const t = document.querySelector(`.ntab[data-nid="${n2.id}"] .ntab-name`);
        if (t) t.textContent = n2.title || 'untitled';
        setSyncing(n2.id, true);
        clearTimeout(titleTimer);
        titleTimer = setTimeout(() => {
          api('PATCH', '/notes/' + n2.id, { title: n2.title, body: n2.body }).then(() => setSyncing(n2.id, false));
        }, 800);
      }
    });

    // Body handler
    const ta = panel.querySelector('.nta');
    let bodyTimer;
    ta.addEventListener('input', () => {
      const n2 = notes.find(x => x.id === +ta.dataset.nid);
      if (n2) {
        n2.body = ta.value;
        const c = document.getElementById('nc-' + n2.id);
        if (c) c.textContent = n2.body.length + ' chars';
        setSyncing(n2.id, true);
        clearTimeout(bodyTimer);
        bodyTimer = setTimeout(() => {
          api('PATCH', '/notes/' + n2.id, { title: n2.title, body: n2.body }).then(() => setSyncing(n2.id, false));
        }, 800);
      }
    });
  });
}

function setSyncing(id, on) {
  const dot = document.getElementById('nd-' + id);
  const span = dot && dot.nextElementSibling;
  if (!dot) return;
  dot.classList.toggle('syncing', on);
  if (span) span.textContent = on ? 'saving…' : 'synced';
}

// ── UTILS ──
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
